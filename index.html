<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jak N Poy | Game</title>
    <link rel="shortcut icon" href="/logos/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="container">
    <div class="game-card text-center">
        <h1 class="mb-2">🎮 Jak N Poy</h1>
        <p class="text-dark">Can You Outsmart the Computer?</p>

        <div>
            <div class="d-flex justify-content-between my-3">
                <p>🤖 Computer Score: <span>0</span></p>
                <p>👤 Your Score: <span>0</span></p>
            </div>

            <div class="my-4 d-flex justify-content-center align-items-center gap-5">
                <p id="computer_choice" class="display-1">?</p>
                <p class="fs-2 fw-bold text-secondary">VS</p>
                <p id="user_choice" class="display-1">?</p>
            </div>   
            
            <div>
                <button class="btn btn-light choice-btn">👊</button>
                <button class="btn btn-light choice-btn">🫱</button>
                <button class="btn btn-light choice-btn">✌️</button>
            </div>

            <div class="game-info d-flex justify-content-between align-items-center mt-4">
                <p class="mb-0 game-text">Game: <span>1</span></p>
                <button class="btn btn-danger btn-sm reset-btn">Reset Game</button>
            </div>
        </div>
    </div>
</body>
</html>
